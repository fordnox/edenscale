<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Iconography</title>
<link rel="stylesheet" href="_base.css">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body>
<div class="card">
  <div class="eyebrow">Iconography · Lucide · 1.5px stroke</div>
  <div style="display:grid;grid-template-columns:repeat(8,1fr);gap:18px;color:var(--fg-secondary);align-items:center;justify-items:center">
    <i data-lucide="briefcase"></i>
    <i data-lucide="trending-up"></i>
    <i data-lucide="line-chart"></i>
    <i data-lucide="landmark"></i>
    <i data-lucide="leaf"></i>
    <i data-lucide="scale"></i>
    <i data-lucide="archive"></i>
    <i data-lucide="lock"></i>
    <i data-lucide="file-text"></i>
    <i data-lucide="mail"></i>
    <i data-lucide="globe"></i>
    <i data-lucide="users"></i>
    <i data-lucide="clock"></i>
    <i data-lucide="shield"></i>
    <i data-lucide="bookmark"></i>
    <i data-lucide="arrow-up-right"></i>
  </div>
  <hr class="hairline">
  <div style="display:flex;gap:24px;align-items:center;font-size:12px;color:var(--fg-tertiary)">
    <span style="display:flex;align-items:center;gap:6px;color:var(--fg-secondary)"><i data-lucide="arrow-right" style="width:14px;height:14px"></i>14 inline</span>
    <span style="display:flex;align-items:center;gap:6px;color:var(--fg-secondary)"><i data-lucide="arrow-right" style="width:20px;height:20px"></i>20 control</span>
    <span style="display:flex;align-items:center;gap:6px;color:var(--fg-secondary)"><i data-lucide="arrow-right" style="width:24px;height:24px"></i>24 default</span>
    <span style="display:flex;align-items:center;gap:6px;color:var(--fg-brand)"><i data-lucide="arrow-right" style="width:32px;height:32px"></i>32 feature</span>
  </div>
</div>
<script>lucide.createIcons({attrs:{'stroke-width':1.5}});</script>
</body>
</html>
