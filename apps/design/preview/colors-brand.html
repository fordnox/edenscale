<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Colors — Brand</title>
<link rel="stylesheet" href="_base.css">
</head>
<body>
<div class="card">
  <div class="eyebrow">Brand · Conifer Green</div>
  <div class="grid-9">
    <div class="swatch"><div class="swatch-chip" style="background:var(--conifer-50)"></div><div class="swatch-name">50</div><div class="swatch-meta"><span>#F1F4F1</span></div></div>
    <div class="swatch"><div class="swatch-chip" style="background:var(--conifer-100)"></div><div class="swatch-name">100</div><div class="swatch-meta"><span>#DDE5DE</span></div></div>
    <div class="swatch"><div class="swatch-chip" style="background:var(--conifer-200)"></div><div class="swatch-name">200</div><div class="swatch-meta"><span>#B8C7BB</span></div></div>
    <div class="swatch"><div class="swatch-chip" style="background:var(--conifer-300)"></div><div class="swatch-name">300</div><div class="swatch-meta"><span>#8AA290</span></div></div>
    <div class="swatch"><div class="swatch-chip" style="background:var(--conifer-400)"></div><div class="swatch-name">400</div><div class="swatch-meta"><span>#5C7C66</span></div></div>
    <div class="swatch"><div class="swatch-chip" style="background:var(--conifer-500)"></div><div class="swatch-name">500</div><div class="swatch-meta"><span>#3A5C46</span></div></div>
    <div class="swatch"><div class="swatch-chip" style="background:var(--conifer-600);outline:2px solid var(--brass-500);outline-offset:2px"></div><div class="swatch-name">600 ★</div><div class="swatch-meta"><span>#2A4736</span></div></div>
    <div class="swatch"><div class="swatch-chip" style="background:var(--conifer-700)"></div><div class="swatch-name">700</div><div class="swatch-meta"><span>#1F3D2E</span></div></div>
    <div class="swatch"><div class="swatch-chip" style="background:var(--conifer-900)"></div><div class="swatch-name">900</div><div class="swatch-meta"><span>#0E1B14</span></div></div>
  </div>
  <hr class="hairline">
  <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--fg-tertiary)">
    <span>Primary brand · Conifer 600 (★)</span>
    <span>Use 700 on inverse sections · 900 for emphasis</span>
  </div>
</div>
</body>
</html>
