<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Spacing scale</title>
<link rel="stylesheet" href="_base.css">
</head>
<body>
<div class="card">
  <div class="eyebrow">Spacing · 4px base</div>
  <div style="display:flex;flex-direction:column;gap:8px;font-family:var(--font-sans);font-size:12px;color:var(--fg-tertiary)">
    <div style="display:flex;align-items:center;gap:14px"><span style="width:60px">sp-1 · 4</span><div style="height:14px;width:4px;background:var(--conifer-700)"></div></div>
    <div style="display:flex;align-items:center;gap:14px"><span style="width:60px">sp-2 · 8</span><div style="height:14px;width:8px;background:var(--conifer-700)"></div></div>
    <div style="display:flex;align-items:center;gap:14px"><span style="width:60px">sp-3 · 12</span><div style="height:14px;width:12px;background:var(--conifer-700)"></div></div>
    <div style="display:flex;align-items:center;gap:14px"><span style="width:60px">sp-4 · 16</span><div style="height:14px;width:16px;background:var(--conifer-700)"></div></div>
    <div style="display:flex;align-items:center;gap:14px"><span style="width:60px">sp-5 · 24</span><div style="height:14px;width:24px;background:var(--conifer-700)"></div></div>
    <div style="display:flex;align-items:center;gap:14px"><span style="width:60px">sp-6 · 32</span><div style="height:14px;width:32px;background:var(--conifer-700)"></div></div>
    <div style="display:flex;align-items:center;gap:14px"><span style="width:60px">sp-7 · 48</span><div style="height:14px;width:48px;background:var(--conifer-700)"></div></div>
    <div style="display:flex;align-items:center;gap:14px"><span style="width:60px">sp-8 · 64</span><div style="height:14px;width:64px;background:var(--conifer-700)"></div></div>
    <div style="display:flex;align-items:center;gap:14px"><span style="width:60px">sp-9 · 96</span><div style="height:14px;width:96px;background:var(--conifer-700)"></div></div>
    <div style="display:flex;align-items:center;gap:14px"><span style="width:60px">sp-10 · 128</span><div style="height:14px;width:128px;background:var(--conifer-700)"></div></div>
    <div style="display:flex;align-items:center;gap:14px"><span style="width:60px">sp-11 · 192</span><div style="height:14px;width:192px;background:var(--conifer-700)"></div></div>
  </div>
</div>
</body>
</html>
