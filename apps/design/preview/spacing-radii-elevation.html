<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Radii & elevation</title>
<link rel="stylesheet" href="_base.css">
</head>
<body>
<div class="card">
  <div class="eyebrow">Radii · default is 0</div>
  <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px">
    <div style="text-align:center">
      <div style="height:64px;background:var(--bg-surface);border:1px solid var(--border-default);border-radius:0;margin-bottom:6px"></div>
      <div style="font-size:11px;color:var(--fg-tertiary)">none · 0 · cards, sections</div>
    </div>
    <div style="text-align:center">
      <div style="height:64px;background:var(--bg-surface);border:1px solid var(--border-default);border-radius:2px;margin-bottom:6px"></div>
      <div style="font-size:11px;color:var(--fg-tertiary)">xs · 2 · inputs, buttons</div>
    </div>
    <div style="text-align:center">
      <div style="height:64px;background:var(--bg-surface);border:1px solid var(--border-default);border-radius:4px;margin-bottom:6px"></div>
      <div style="font-size:11px;color:var(--fg-tertiary)">sm · 4 · sparing</div>
    </div>
    <div style="text-align:center">
      <div style="height:32px;width:80px;background:var(--bg-surface);border:1px solid var(--border-default);border-radius:999px;margin:16px auto 6px"></div>
      <div style="font-size:11px;color:var(--fg-tertiary)">pill · 999 · status chips only</div>
    </div>
  </div>
  <hr class="hairline">
  <div class="eyebrow" style="color:var(--fg-tertiary)">Elevation · used sparingly</div>
  <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:14px">
    <div style="text-align:center">
      <div style="height:64px;background:var(--bg-surface);border:1px solid var(--border-hairline);margin-bottom:6px"></div>
      <div style="font-size:11px;color:var(--fg-tertiary)">none · default</div>
    </div>
    <div style="text-align:center">
      <div style="height:64px;background:var(--bg-surface);box-shadow:0 1px 2px rgba(26,26,24,0.05),0 1px 0 rgba(26,26,24,0.04);margin-bottom:6px"></div>
      <div style="font-size:11px;color:var(--fg-tertiary)">sm · dropdowns</div>
    </div>
    <div style="text-align:center">
      <div style="height:64px;background:var(--bg-surface);box-shadow:0 4px 12px rgba(26,26,24,0.06),0 1px 0 rgba(26,26,24,0.04);margin-bottom:6px"></div>
      <div style="font-size:11px;color:var(--fg-tertiary)">md · toasts, modals</div>
    </div>
    <div style="text-align:center">
      <div style="height:64px;background:var(--bg-surface);box-shadow:0 18px 40px -12px rgba(14,27,20,0.18);margin-bottom:6px"></div>
      <div style="font-size:11px;color:var(--fg-tertiary)">lg · hero CTA only</div>
    </div>
  </div>
</div>
</body>
</html>
