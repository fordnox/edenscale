<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Type — Numerals & Eyebrows</title>
<link rel="stylesheet" href="_base.css">
</head>
<body>
<div class="card">
  <div class="eyebrow">Eyebrow · UPPERCASE · 0.16em tracking</div>
  <div style="font-family:var(--font-sans);font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.16em;color:var(--fg-accent);margin-bottom:18px">Approach &nbsp;·&nbsp; Quarterly Letter &nbsp;·&nbsp; Limited Partner Portal</div>
  <hr class="hairline">
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:24px;margin-top:12px">
    <div>
      <div style="font-size:11px;color:var(--fg-tertiary);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:8px">Tabular · for data</div>
      <div style="font-family:var(--font-sans);font-feature-settings:'tnum' 1,'lnum' 1;font-size:22px;color:var(--fg-primary);line-height:1.3">
        $1,284,500,000<br>
        12.4%&nbsp;&nbsp;&nbsp;3.1×<br>
        2018 – 2024
      </div>
    </div>
    <div>
      <div style="font-size:11px;color:var(--fg-tertiary);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:8px">Oldstyle · for editorial</div>
      <div style="font-family:var(--font-display);font-feature-settings:'onum' 1;font-weight:500;font-size:30px;color:var(--fg-primary);line-height:1.2">
        Founded 1998<br>
        Vol. xii · No. 3<br>
        $1.28b · 12.4%
      </div>
    </div>
  </div>
</div>
</body>
</html>
