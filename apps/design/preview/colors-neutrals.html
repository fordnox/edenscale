<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Colors — Neutrals</title>
<link rel="stylesheet" href="_base.css">
</head>
<body>
<div class="card">
  <div class="eyebrow">Neutrals · Parchment & Ink</div>
  <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px">
    <div class="swatch"><div class="swatch-chip" style="background:var(--parchment-50);border:1px solid var(--border-hairline)"></div><div class="swatch-name">parchment-50</div><div class="swatch-meta"><span>#FBF9F4</span><span>page</span></div></div>
    <div class="swatch"><div class="swatch-chip" style="background:var(--parchment-100)"></div><div class="swatch-name">parchment-100</div><div class="swatch-meta"><span>#F5F1E8</span><span>raised</span></div></div>
    <div class="swatch"><div class="swatch-chip" style="background:var(--parchment-200)"></div><div class="swatch-name">parchment-200</div><div class="swatch-meta"><span>#EDE7D8</span><span>sunken</span></div></div>
    <div class="swatch"><div class="swatch-chip" style="background:var(--parchment-300)"></div><div class="swatch-name">parchment-300</div><div class="swatch-meta"><span>#DFD7C3</span></div></div>
  </div>
  <hr class="hairline">
  <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px">
    <div class="swatch"><div class="swatch-chip" style="background:var(--ink-300)"></div><div class="swatch-name">ink-300</div><div class="swatch-meta"><span>#B8B5AC</span><span>muted</span></div></div>
    <div class="swatch"><div class="swatch-chip" style="background:var(--ink-500)"></div><div class="swatch-name">ink-500</div><div class="swatch-meta"><span>#6F6E68</span><span>tertiary</span></div></div>
    <div class="swatch"><div class="swatch-chip" style="background:var(--ink-700)"></div><div class="swatch-name">ink-700</div><div class="swatch-meta"><span>#3A3A36</span><span>secondary</span></div></div>
    <div class="swatch"><div class="swatch-chip" style="background:var(--ink-900)"></div><div class="swatch-name">ink-900</div><div class="swatch-meta"><span>#1A1A18</span><span>primary text</span></div></div>
  </div>
</div>
</body>
</html>
