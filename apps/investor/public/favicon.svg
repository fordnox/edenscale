<!-- NewTaven Investor favicon.
     Deliberately NOT the full leaf mark. At 16px the leaf silhouette plus a
     knocked-out glyph is two levels of detail and both turn to mush, so the
     favicon carries the return arrow alone, enlarged. The leaf survives
     everywhere it has room: icon-any.svg, icon-maskable.svg,
     packages/brand/assets/mark-investor.svg.
     Square-cornered per the design system (radius-none is the default);
     opaque tile so it stays legible on light and dark tab strips. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="NewTaven Investor">
  <rect width="64" height="64" fill="#8A6A3F"/>
  <g fill="#FBF9F4" transform="translate(32 32) scale(1.5) translate(-31.9 -33)">
    <path d="M26 19 L 46 19 L 46 39 L 40 39 L 40 25 L 26 25 Z"/>
    <path d="M22.12 47.12 L 44.12 25.12 L 39.88 20.88 L 17.88 42.88 Z"/>
  </g>
</svg>
