<!-- NewTaven Manager — manifest icon, purpose "maskable".
     The OS crops this to a circle/squircle, so the mark is held inside the
     40%-radius safe zone (scale 0.65) and the tile bleeds to the edge.
     It WILL look over-padded uncropped — that is correct; use icon-any.svg there. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="NewTaven Manager">
  <rect width="64" height="64" fill="#1F3D2E"/>
  <g transform="translate(32 32) scale(0.65) translate(-32 -32)">
    <path fill="#FBF9F4" d="M32 4 C 18 12, 10 24, 10 36 C 10 49, 20 60, 32 60 C 44 60, 54 49, 54 36 C 54 24, 46 12, 32 4 Z"/>
    <path fill="#1F3D2E" d="M32 20 L 40 30 L 35 30 L 35 50 L 29 50 L 29 30 L 24 30 Z"/>
  </g>
</svg>
