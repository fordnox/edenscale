<!-- NewTaven Manager favicon.
     Deliberately NOT the full leaf mark. At 16px the leaf silhouette plus a
     knocked-out glyph is two levels of detail and both turn to mush, so the
     favicon carries the growth arrow alone, enlarged and thickened. The leaf
     survives everywhere it has room: icon-any.svg, icon-maskable.svg,
     packages/brand/assets/mark-manager.svg.
     Square-cornered per the design system (radius-none is the default);
     opaque tile so it stays legible on light and dark tab strips. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="NewTaven Manager">
  <rect width="64" height="64" fill="#1F3D2E"/>
  <g fill="#FBF9F4" transform="translate(32 32) scale(1.4) translate(-32 -32)">
    <path d="M32 16 L 45 30 L 37 30 L 37 48 L 27 48 L 27 30 L 19 30 Z"/>
  </g>
</svg>
