<!-- NewTaven Superadmin favicon.
     Deliberately NOT the full leaf mark. At 16px the leaf silhouette plus a
     knocked-out glyph is two levels of detail and both turn to mush, so the
     favicon carries the keyhole alone, enlarged and thickened. The leaf
     survives everywhere it has room: icon-any.svg, icon-maskable.svg,
     packages/brand/assets/mark-superadmin.svg.
     Square-cornered per the design system (radius-none is the default);
     opaque tile so it stays legible on light and dark tab strips. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="NewTaven Superadmin">
  <rect width="64" height="64" fill="#1A1A18"/>
  <g fill="#FBF9F4" transform="translate(32 32) scale(1.4) translate(-32 -34)">
    <circle cx="32" cy="28" r="10"/>
    <path d="M28 34 L 36 34 L 39 50 L 25 50 Z"/>
  </g>
</svg>
