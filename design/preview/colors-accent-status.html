<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Colors — Accent & Status</title>
<link rel="stylesheet" href="_base.css">
</head>
<body>
<div class="card">
  <div class="eyebrow">Accent · Aged Brass</div>
  <div style="display:grid;grid-template-columns:repeat(6,1fr);gap:10px">
    <div class="swatch"><div class="swatch-chip" style="background:var(--brass-50);border:1px solid var(--border-hairline)"></div><div class="swatch-name">50</div><div class="swatch-meta"><span>#FAF4EA</span></div></div>
    <div class="swatch"><div class="swatch-chip" style="background:var(--brass-100)"></div><div class="swatch-name">100</div><div class="swatch-meta"><span>#F2E5CB</span></div></div>
    <div class="swatch"><div class="swatch-chip" style="background:var(--brass-300)"></div><div class="swatch-name">300</div><div class="swatch-meta"><span>#D6B785</span></div></div>
    <div class="swatch"><div class="swatch-chip" style="background:var(--brass-500)"></div><div class="swatch-name">500</div><div class="swatch-meta"><span>#B8915C</span></div></div>
    <div class="swatch"><div class="swatch-chip" style="background:var(--brass-700)"></div><div class="swatch-name">700</div><div class="swatch-meta"><span>#8A6A3F</span></div></div>
    <div class="swatch"><div class="swatch-chip" style="background:var(--brass-900)"></div><div class="swatch-name">900</div><div class="swatch-meta"><span>#4D3A22</span></div></div>
  </div>
  <hr class="hairline">
  <div class="eyebrow" style="color:var(--fg-tertiary)">Semantic Status · muted, institutional</div>
  <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px">
    <div class="swatch"><div class="swatch-chip" style="background:#4A7A4F"></div><div class="swatch-name">positive</div><div class="swatch-meta"><span>gain</span></div></div>
    <div class="swatch"><div class="swatch-chip" style="background:#9A4A3D"></div><div class="swatch-name">negative</div><div class="swatch-meta"><span>loss</span></div></div>
    <div class="swatch"><div class="swatch-chip" style="background:#4A6A8A"></div><div class="swatch-name">info</div><div class="swatch-meta"><span>note</span></div></div>
    <div class="swatch"><div class="swatch-chip" style="background:#B8915C"></div><div class="swatch-name">warning</div><div class="swatch-meta"><span>caution</span></div></div>
  </div>
  <p style="font-size:11px;color:var(--fg-tertiary);margin-top:12px">Brass is reserved for eyebrow labels, link underlines, and one display emphasis per page. Never primary buttons.</p>
</div>
</body>
</html>
