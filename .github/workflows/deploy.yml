name: Build & Deploy (Kamal)

on:
  push:
    branches: ["main"]
    paths:
      - "apps/backend/**"
      - "config/deploy.yml"
      - ".kamal/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch: {}

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  # Image repo on ghcr.io — must match `image:` in config/deploy.yml.
  IMAGE: ghcr.io/${{ github.repository }}_backend
  # Lets the `op` CLI (used by .kamal/secrets and the SSH step) auth non-interactively.
  OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v5

      # 1Password CLI — used by .kamal/secrets (`kamal secrets fetch`) and the SSH step.
      - name: Install 1Password CLI
        uses: 1password/install-cli-action@v1

      # --- BUILD (GitHub Actions) ---------------------------------------
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ./apps/backend
          file: ./apps/backend/Dockerfile
          platforms: linux/amd64
          push: true
          # Tag with the commit SHA so `kamal deploy --version` matches exactly,
          # plus a moving `latest` tag for convenience.
          tags: |
            ${{ env.IMAGE }}:${{ github.sha }}
            ${{ env.IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # --- DEPLOY (Kamal) ------------------------------------------------
      - name: Set up Ruby & Kamal
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"

      - name: Install Kamal
        run: gem install kamal -v "~> 2.0"

      - name: Load SSH key from 1Password into the agent
        run: |
          eval "$(ssh-agent -s)"
          op read "op://Github/mle/SSH_PRIVATE_KEY" | ssh-add -
          echo "SSH_AUTH_SOCK=$SSH_AUTH_SOCK" >> "$GITHUB_ENV"
          echo "SSH_AGENT_PID=$SSH_AGENT_PID" >> "$GITHUB_ENV"

      # Kamal reads .kamal/secrets, which fetches all values from 1Password via `op`.
      - name: Deploy with Kamal (skip build/push — image already in ghcr)
        run: kamal deploy --skip-push --version=${{ github.sha }}

      - name: Run database migrations
        run: kamal app exec --reuse --version=${{ github.sha }} "/app/.venv/bin/alembic upgrade head"
